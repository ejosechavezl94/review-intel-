<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Intel Pro — Amazon FBA Insights</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* --- SISTEMA DE DISEÑO PREMIUM --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

:root {
  --bg: #09090b;
  --card-bg: #121215;
  --card-border: rgba(255,255,255,0.06);
  --text: #fafafa;
  --text-muted: #a1a1aa;
  --accent: #f97316; /* Naranja FBA */
  --accent-hover: #ea580c;
  --green: #10b981;
  --red: #ef4444;
  --amber: #f59e0b;
  --radius: 12px;
  --font-mono: 'Geist Mono', monospace;
}

body { 
  background: var(--bg); 
  color: var(--text); 
  font-family: 'Geist', system-ui, sans-serif; 
  font-size: 14px; 
  line-height: 1.6; 
  background-image: radial-gradient(circle at 50% -20%, #1c1917 0%, #09090b 100%);
  min-height: 100vh;
}

.container { max-width: 900px; margin: 0 auto; padding: 60px 24px; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 48px; }
.brand { display: flex; align-items: center; gap: 16px; }
.logo-box { 
  width: 44px; height: 44px; background: var(--accent); border-radius: 12px; 
  display: flex; align-items: center; justify-content: center; 
  box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
  font-weight: 700; color: white; font-size: 18px;
}
.brand h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.brand p { font-size: 13px; color: var(--text-muted); }

/* Main Input Card */
.main-card { 
  background: var(--card-bg); 
  border: 1px solid var(--card-border); 
  border-radius: var(--radius); 
  padding: 32px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.field-group { margin-bottom: 24px; }
.label { 
  display: block; font-family: var(--font-mono); font-size: 11px; 
  text-transform: uppercase; color: var(--accent); 
  letter-spacing: 1px; margin-bottom: 10px; font-weight: 600;
}

textarea { 
  width: 100%; background: #18181b; border: 1px solid var(--card-border); 
  border-radius: 8px; color: white; padding: 16px; font-family: var(--font-mono);
  font-size: 14px; outline: none; transition: all 0.2s; min-height: 120px;
}
textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

.grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
input, select { 
  background: #18181b; border: 1px solid var(--card-border); 
  border-radius: 8px; color: white; padding: 12px 16px; font-size: 14px; outline: none;
}
input:focus, select:focus { border-color: var(--accent); }

.btn-primary { 
  width: 100%; background: var(--accent); color: white; border: none; 
  padding: 16px; border-radius: 8px; font-weight: 600; cursor: pointer;
  font-size: 15px; transition: all 0.2s;
}
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Loader */
.loader-box { 
  display: none; text-align: center; padding: 40px; 
  background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--card-border);
}
.loader-box.on { display: block; }
.spinner { 
  width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); 
  border-top-color: var(--accent); border-radius: 50%; 
  animation: spin 0.8s linear infinite; margin: 0 auto 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Results */
#results-area { display: none; }
.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.summary-box { 
  background: rgba(249, 115, 22, 0.05); border-left: 4px solid var(--accent);
  padding: 24px; border-radius: 0 8px 8px 0; margin-bottom: 32px; font-size: 15px; line-height: 1.7;
}

/* Tabs */
.tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--card-border); padding-bottom: 12px; }
.tab-btn { 
  background: none; border: none; color: var(--text-muted); 
  padding: 8px 16px; cursor: pointer; font-weight: 500; transition: 0.2s;
}
.tab-btn.active { color: var(--accent); position: relative; }
.tab-btn.active::after { 
  content: ''; position: absolute; bottom: -13px; left: 0; 
  width: 100%; height: 2px; background: var(--accent); 
}

/* Table Design */
.table-container { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 8px; }
th { text-align: left; padding: 16px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--card-border); }
td { padding: 16px; border-bottom: 1px solid var(--card-border); font-size: 14px; }

.badge { 
  padding: 4px 8px; border-radius: 6px; font-family: var(--font-mono); font-size: 11px; font-weight: 600;
}
.badge-red { background: rgba(239, 68, 68, 0.1); color: var(--red); }
.badge-green { background: rgba(16, 185, 129, 0.1); color: var(--green); }

.action-card { 
  background: #18181b; border: 1px solid var(--card-border); 
  padding: 20px; border-radius: 8px; margin-bottom: 12px;
}

.error-msg { 
  display: none; color: var(--red); background: rgba(239, 68, 68, 0.1); 
  padding: 12px; border-radius: 8px; margin-top: 16px; font-size: 13px;
}
.error-msg.on { display: block; }
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <div class="brand">
      <div class="logo-box">RI</div>
      <div>
        <h1>Review Intel <span style="font-weight: 400; color: var(--text-muted);">Pro</span></h1>
        <p>Market Intelligence for Private Label Sellers</p>
      </div>
    </div>
    <div style="font-family: var(--font-mono); font-size: 11px; color: var(--green);">● SYSTEM_OPERATIONAL</div>
  </header>

  <div class="main-card" id="input-ui">
    <div class="field-group">
      <label class="label">Competitor ASINs</label>
      <textarea id="asins-input" placeholder="Pega los ASINs separados por comas (ej: B08XY123, B09TZ456)"></textarea>
    </div>

    <div class="grid-inputs">
      <div class="field-group">
        <label class="label">Marketplace</label>
        <select id="mk-input" style="width: 100%;">
          <option value="es">Amazon España</option>
          <option value="de">Amazon Alemania</option>
          <option value="uk">Amazon UK</option>
          <option value="it">Amazon Italia</option>
          <option value="fr">Amazon Francia</option>
          <option value="us">Amazon USA</option>
        </select>
      </div>
      <div class="field-group">
        <label class="label">Producto</label>
        <input type="text" id="context-input" placeholder="Ej: Alcachofa de ducha" style="width: 100%;">
      </div>
    </div>

    <button class="btn-primary" onclick="runAnalysis()" id="main-btn">Iniciar Deep Research</button>
    <div id="error-box" class="error-msg"></div>
  </div>

  <div id="loader" class="loader-box">
    <div class="spinner"></div>
    <h3 id="loader-title">Extrayendo datos de Amazon...</h3>
    <p id="loader-status" style="color: var(--text-muted); font-size: 13px;">Esto puede tardar hasta 30 segundos</p>
  </div>

  <div id="results-area">
    <div class="result-header">
      <h2 style="font-size: 20px;">Análisis de Oportunidad</h2>
      <button onclick="location.reload()" style="background: none; border: 1px solid var(--card-border); color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer;">Nueva Consulta</button>
    </div>

    <div id="summary-content" class="summary-box"></div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('tab-comparativa')">Comparativa</button>
      <button class="tab-btn" onclick="switchTab('tab-patrones')">Patrones & Gaps</button>
      <button class="tab-btn" onclick="switchTab('tab-acciones')">Plan de Acción</button>
    </div>

    <div id="tab-comparativa" class="tab-content">
      <div class="table-container">
        <table id="comp-table">
          <thead>
            <tr>
              <th>Categoría</th>
              <th>Peor ASIN (Debilidad)</th>
              <th>Mejor ASIN (Fortaleza)</th>
              <th>Análisis</th>
            </tr>
          </thead>
          <tbody id="comp-table-body"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-patrones" class="tab-content" style="display: none;">
      <div id="patterns-list"></div>
    </div>

    <div id="tab-acciones" class="tab-content" style="display: none;">
      <div id="actions-list"></div>
    </div>
  </div>
</div>

<script>
const API_BASE = ''; // Vercel maneja esto automáticamente
const $ = id => document.getElementById(id);

async function runAnalysis() {
  const input = $('asins-input').value;
  const asins = input.split(/[\s,]+/).map(a => a.trim().toUpperCase()).filter(a => a.length >= 8);
  const context = $('context-input').value;
  const mk = $('mk-input').value;

  if (asins.length === 0) return showError("Introduce ASINs válidos");
  
  // UI Loading
  $('input-ui').style.display = 'none';
  $('loader').classList.add('on');
  $('error-box').classList.remove('on');

  try {
    let allReviewsText = "";

    // 1. Obtener reseñas de cada ASIN
    for (let asin of asins) {
      $('loader-title').innerText = `Analizando ASIN: ${asin}...`;
      const res = await fetch(`${API_BASE}/api/get-reviews`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ asin, marketplace: mk })
      });
      const data = await res.json();
      
      if (data.reviews) {
        allReviewsText += `\n--- COMPETIDOR ASIN: ${asin} ---\n`;
        allReviewsText += data.reviews.map(r => `[${r.stars} estrellas] ${r.review_text}`).join('\n');
      }
    }

    // 2. Análisis con IA
    $('loader-title').innerText = `Procesando comparativa final...`;
    const resAi = await fetch(`${API_BASE}/api/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reviewsData: allReviewsText, product_context: context })
    });
    const aiData = await resAi.json();

    if (!resAi.ok) throw new Error(aiData.error);

    renderResults(aiData.analysis);

  } catch (e) {
    console.error(e);
    $('loader').classList.remove('on');
    $('input-ui').style.display = 'block';
    showError("Error: " + e.message);
  }
}

function renderResults(data) {
  $('loader').classList.remove('on');
  $('results-area').style.display = 'block';
  
  $('summary-content').innerText = data.summary;

  // Render Tabla
  $('comp-table-body').innerHTML = data.comparison_table.map(t => `
    <tr>
      <td style="font-weight: 600;">${t.topic}</td>
      <td><span class="badge badge-red">${t.worst_asin}</span></td>
      <td><span class="badge badge-green">${t.best_asin}</span></td>
      <td style="color: var(--text-muted); font-size: 13px;">${t.insight}</td>
    </tr>
  `).join('');

  // Render Patrones
  $('patterns-list').innerHTML = data.patterns_and_gaps.map(p => `
    <div class="action-card">
      <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
        <span class="label" style="margin:0;">${p.theme}</span>
        <span style="font-size:11px; color:var(--amber); font-family:var(--font-mono);">${p.star_range}</span>
      </div>
      <p style="font-weight:600; margin-bottom:4px;">${p.pattern}</p>
      <p style="color:var(--green); font-size:13px;">💡 Oportunidad: ${p.opportunity}</p>
    </div>
  `).join('');

  // Render Acciones
  $('actions-list').innerHTML = data.actions.map(a => `
    <div class="action-card" style="border-left: 3px solid var(--accent);">
      <div class="aitem-pri ${a.priority.toLowerCase()}">${a.priority} PRIORIDAD</div>
      <div class="aitem-act">${a.action}</div>
      <div class="aitem-imp">Impacto: ${a.impact}</div>
    </div>
  `).join('');
}

function switchTab(id) {
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  $(id).style.display = 'block';
  event.currentTarget.classList.add('active');
}

function showError(m) {
  $('error-box').innerText = m;
  $('error-box').classList.add('on');
}
</script>

</body>
</html>
